<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us - Malunggay Pandesal</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        .navbar { 
            border-radius: 0; 
            margin-bottom: 0; 
            background-color: forestgreen; 
            border: none;
        }
        
        .navbar-default .navbar-brand, 
        .navbar-default .navbar-nav > li > a {
            color: white !important;
        }

        .navbar-default .navbar-toggle {
            border-color: white;
        }

        .navbar-default .navbar-toggle .icon-bar {
            background-color: white;
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .contact-animation {
            animation: slideRight 1s ease-in-out;
        }

        .well {
            background-color: whitesmoke;
            border: 1px solid silver;
            transition: 0.3s;
        }

        .well:hover {
            border-color: green;
            background-color: lightgray;
        }

        .btn-primary {
            background-color: seagreen;
            border-color: darkgreen;
        }

        .btn-primary:hover {
            background-color: forestgreen;
        }

        footer { 
            padding: 30px 15px; 
            background-color: black; 
            color: white; 
            margin-top: 40px;
        }

        #myBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99;
            background-color: green;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            h2 {
                text-align: center;
                font-size: 24px;
            }
            .well {
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-default">
  <div class="container">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#myNavbar">
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="index.html">Malunggay Pandesal Project</a>
    </div>
    <div class="collapse navbar-collapse" id="myNavbar">
      <ul class="nav navbar-nav navbar-right">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li class="active"><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container contact-animation" style="padding-top: 30px;">
    <div class="row">
        <div class="col-md-8">
            <h2 style="color: darkgreen;">Get in Touch</h2>
            <hr style="border-top: 2px solid seagreen;">
            <form>
                <div class="form-group">
                    <label for="name" style="color: darkolivegreen;">Name:</label>
                    <input type="text" class="form-control" id="name" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email" style="color: darkolivegreen;">Email address:</label>
                    <input type="email" class="form-control" id="email" placeholder="Your Email">
                </div>
                <div class="form-group">
                    <label for="message" style="color: darkolivegreen;">Message:</label>
                    <textarea class="form-control" id="message" rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Send Message</button>
            </form>
        </div>

        <div class="col-md-4">
            <div class="well">
                <h4 style="color: forestgreen;">Visit Our Shop</h4>
                <p><strong>Address:</strong><br>
                Morocco street<br>
                Molino 3 Bacoor, Cavite 4102</p>
                
                <p><strong>Hours:</strong><br>
                Mon-Sun: 10am - 10pm</p>
                
                <p><strong>Phone:</strong><br>
                09511495253</p>
            </div>
        </div>
    </div>
</div>

<button onclick="topFunction()" id="myBtn" title="Go to top">Top</button>

<footer class="text-center">
    <div class="container">
        <p>&copy; 2024 Web Programming Project</p>
        <p>Submitted by: <strong>Villanueva, Jay-m O.</strong></p>
        <p>Section: BSIT-2A</p>
    </div>
</footer>
